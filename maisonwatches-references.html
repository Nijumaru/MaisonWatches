<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #C9A84C; --gold-light: #E8D5A3; --gold-dark: #8B6914;
  --black: #0D0D0D; --dark: #111111; --surface: #161616; --surface2: #1C1C1C; --surface3: #222222;
  --border: rgba(201,168,76,0.12); --border-mid: rgba(201,168,76,0.25); --border-strong: rgba(255,255,255,0.08);
  --text: #F0EDE8; --text-muted: #7A7572; --text-dim: #3A3835;
  --green: #4CAF50; --red: #E53935;
}
body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); display: flex; min-height: 100vh; }

.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--black); border-right: 0.5px solid var(--border);
  display: flex; flex-direction: column;
  padding: 1.5rem 0; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50;
}
.sidebar-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--gold); letter-spacing: 0.1em; padding: 0 1.25rem 1.5rem; border-bottom: 0.5px solid var(--border); }
.sidebar-nav { padding: 1.25rem 0.75rem; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; color: var(--text-muted); margin-bottom: 2px; transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; text-decoration: none; }
.nav-item:hover { background: var(--surface); color: var(--text); }
.nav-item.active { background: var(--surface2); color: var(--text); }
.nav-item svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; flex-shrink: 0; }
.nav-section-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); padding: 12px 12px 4px; }
.sidebar-bottom { padding: 1rem 0.75rem; border-top: 0.5px solid var(--border); }
.user-pill { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 4px; background: var(--surface); }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--gold-dark), var(--gold)); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--black); flex-shrink: 0; }
.user-name { font-size: 12px; color: var(--text); font-weight: 500; }
.user-plan { font-size: 10px; color: var(--gold-dark); }

.main { margin-left: 220px; flex: 1; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; border-bottom: 0.5px solid var(--border-strong); background: var(--dark); position: sticky; top: 0; z-index: 40; }
.page-title { font-size: 15px; font-weight: 500; }

.content { padding: 2rem; }

.search-bar { display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.search-input-wrap { flex: 1; min-width: 200px; position: relative; }
.search-input-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; stroke: var(--text-muted); fill: none; stroke-width: 1.5; }
.search-input { width: 100%; background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: 4px; padding: 9px 12px 9px 36px; color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; }
.search-input:focus { outline: none; border-color: var(--border-mid); }
.filter-select { background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: 4px; padding: 9px 12px; color: var(--text-muted); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; }
.filter-select:focus { outline: none; }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
.stat-mini { background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: 4px; padding: 1rem; }
.stat-mini-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
.stat-mini-val { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 300; color: var(--text); }

.results-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.results-count { font-size: 12px; color: var(--text-muted); }
.sort-select { background: none; border: none; color: var(--text-muted); font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

.refs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }

.ref-card { background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: 4px; padding: 1.25rem; cursor: pointer; transition: all 0.15s; position: relative; overflow: hidden; }
.ref-card:hover { background: var(--surface2); border-color: var(--border-mid); }
.ref-card-brand { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold-dark); margin-bottom: 4px; }
.ref-card-model { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.ref-card-ref { font-size: 11px; color: var(--text-muted); font-family: monospace; margin-bottom: 12px; }
.ref-card-price { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; color: var(--text); line-height: 1; margin-bottom: 4px; }
.ref-card-retail { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
.ref-card-footer { display: flex; align-items: center; justify-content: space-between; }
.ref-card-delta { font-size: 12px; font-weight: 500; }
.delta-up { color: var(--green); }
.delta-down { color: var(--red); }
.delta-flat { color: var(--text-muted); }
.ref-card-actions { display: flex; gap: 6px; }
.btn-xs { font-size: 11px; padding: 5px 10px; border-radius: 3px; cursor: pointer; border: 0.5px solid var(--border-mid); background: transparent; color: var(--text-muted); transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.btn-xs:hover { color: var(--text); border-color: var(--gold-dark); }
.btn-xs-gold { background: var(--gold); color: var(--black); border-color: var(--gold); font-size: 11px; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.btn-xs-gold:hover { background: var(--gold-light); }

.brand-pill { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; background: var(--surface3); color: var(--text-muted); border: 0.5px solid var(--border); margin-right: 4px; margin-bottom: 6px; cursor: pointer; transition: all 0.1s; }
.brand-pill.active { background: rgba(201,168,76,0.1); color: var(--gold); border-color: var(--border-mid); }
.brand-pills { margin-bottom: 1.25rem; }

.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 300; background: var(--surface3); border: 0.5px solid var(--border-mid); border-radius: 4px; padding: 12px 16px; font-size: 13px; color: var(--text); transform: translateY(80px); opacity: 0; transition: all 0.25s; display: flex; align-items: center; gap: 8px; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

.empty-search { text-align: center; padding: 4rem 1rem; color: var(--text-muted); font-size: 14px; }

@media (max-width: 1100px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) { .sidebar { display: none; } .main { margin-left: 0; } .content { padding: 1rem; } }
</style>

let filtered = [...REFS];
let activeBrand = '';

function fmt(n) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n);
}

function getBrands() {
  return [...new Set(REFS.map(r => r.brand))].sort();
}

function renderBrandPills() {
  const brands = getBrands();
  const el = document.getElementById('brand-pills');
  el.innerHTML = `<span class="brand-pill ${activeBrand === '' ? 'active' : ''}" onclick="setBrand('')">Toutes</span>` +
    brands.map(b => `<span class="brand-pill ${activeBrand === b ? 'active' : ''}" onclick="setBrand('${b}')">${b}</span>`).join('');
}

function setBrand(b) {
  activeBrand = b;
  renderBrandPills();
  filterRefs();
}

function filterRefs() {
  const q = document.getElementById('search').value.toLowerCase();
  const range = document.getElementById('filter-range').value;
  const trend = document.getElementById('filter-trend').value;

  filtered = REFS.filter(r => {
    const matchQ = !q || r.brand.toLowerCase().includes(q) || r.model.toLowerCase().includes(q) || r.ref.toLowerCase().includes(q) || (r.desc && r.desc.toLowerCase().includes(q));
    const matchBrand = !activeBrand || r.brand === activeBrand;
    let matchRange = true;
    if (range) {
      const [min, max] = range.split('-').map(Number);
      matchRange = r.market >= min && r.market <= max;
    }
    let matchTrend = true;
    if (trend === 'up') matchTrend = r.delta > 1;
    if (trend === 'down') matchTrend = r.delta < -1;
    if (trend === 'flat') matchTrend = r.delta >= -1 && r.delta <= 1;
    return matchQ && matchBrand && matchRange && matchTrend;
  });

  renderGrid();
}

function sortRefs(by) {
  if (by === 'brand') filtered.sort((a,b) => a.brand.localeCompare(b.brand));
  if (by === 'price-asc') filtered.sort((a,b) => a.market - b.market);
  if (by === 'price-desc') filtered.sort((a,b) => b.market - a.market);
  if (by === 'delta-desc') filtered.sort((a,b) => b.delta - a.delta);
  if (by === 'delta-asc') filtered.sort((a,b) => a.delta - b.delta);
  renderGrid();
}

function addToCollection(r) {
  const watches = JSON.parse(localStorage.getItem('wv_watches') || '[]');
  if (watches.length >= 3) { showToast('Limite 3 montres atteinte — passez en Pro 🔓'); return; }
  const exists = watches.find(w => w.ref === r.ref);
  if (exists) { showToast('Cette référence est déjà dans votre collection'); return; }
  watches.push({ brand: r.brand, model: r.model, ref: r.ref, year: String(r.year), purchasePrice: r.market, condition: 'good', notes: r.desc, addedAt: new Date().toISOString() });
  localStorage.setItem('wv_watches', JSON.stringify(watches));
  showToast(`${r.brand} ${r.model} ajoutée à la collection ✓`);
}

function addAlert(r) {
  const alerts = JSON.parse(localStorage.getItem('wv_alerts') || '[]');
  const exists = alerts.find(a => a.name.includes(r.ref));
  if (exists) { showToast('Une alerte existe déjà pour cette référence'); return; }
  alerts.push({ name: `${r.brand} ${r.model} ${r.ref}`, current: r.market, target: Math.round(r.market * 0.9), createdAt: new Date().toISOString() });
  localStorage.setItem('wv_alerts', JSON.stringify(alerts));
  showToast(`Alerte créée pour ${r.brand} ${r.model} ✓`);
}

function renderGrid() {
  const grid = document.getElementById('refs-grid');
  const empty = document.getElementById('empty-search');
  document.getElementById('results-count').textContent = `${filtered.length} référence${filtered.length > 1 ? 's' : ''} trouvée${filtered.length > 1 ? 's' : ''}`;

  if (!filtered.length) { grid.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map((r, i) => {
    const deltaClass = r.delta > 1 ? 'delta-up' : r.delta < -1 ? 'delta-down' : 'delta-flat';
    const deltaSign = r.delta > 0 ? '+' : '';
    const premium = Math.round(((r.market - r.retail) / r.retail) * 100);
    const premiumStr = premium > 0 ? `+${premium}% vs boutique` : premium < 0 ? `${premium}% vs boutique` : 'Au prix boutique';
    return `<div class="ref-card">
      <div class="ref-card-brand">${r.brand}</div>
      <div class="ref-card-model">${r.model}</div>
      <div class="ref-card-ref">${r.ref} · ${r.desc}</div>
      <div class="ref-card-price">${fmt(r.market)}</div>
      <div class="ref-card-retail">Boutique : ${fmt(r.retail)} · <span style="color:${premium >= 0 ? 'var(--green)' : 'var(--red)'}">${premiumStr}</span></div>
      <div class="ref-card-footer">
        <div class="ref-card-delta ${deltaClass}">${deltaSign}${r.delta}% / 6 mois</div>
        <div class="ref-card-actions">
          <button class="btn-xs" onclick="addAlert(${JSON.stringify(r).replace(/"/g,'&quot;')})">+ Alerte</button>
          <button class="btn-xs-gold" onclick="addToCollection(${JSON.stringify(r).replace(/"/g,'&quot;')})">+ Collection</button>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('total-refs').textContent = REFS.length;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

renderBrandPills();
filterRefs();
